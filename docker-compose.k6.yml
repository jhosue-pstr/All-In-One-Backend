services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jpastor
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: ALL-IN-ONE-DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jpastor -d ALL-IN-ONE-DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jpastor:123@db:5432/ALL-IN-ONE-DB
      SECRET_KEY: default-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: admin123
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./k6/grafana/provisioning:/etc/grafana/provisioning
      - ./k6/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  k6:
    image: grafana/k6:latest
    container_name: k6
    volumes:
      - ./k6/tests:/scripts/tests
      - ./k6/config:/scripts/config
      - ./k6/results:/results
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      K6_OUT: influxdb=http://influxdb:8086/k6
    entrypoint: ["tail", "-f", "/dev/null"]

networks:
  app-network:
    name: app-network
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  grafana_data:
