services:
  baseline:
    image: ghcr.io/zaproxy/zaproxy:stable
    user: root
    volumes:
      - ./zap/reports:/zap/wrk/:rw
    environment:
      TARGET_URL: http://backend-1:8000
    command: >
      zap-baseline.py
      -t http://backend-1:8000
      -r baseline-report.html
      -J baseline-report.json
      -x baseline-report.xml
      -I
    networks:
      - app-network

  fullscan:
    image: ghcr.io/zaproxy/zaproxy:stable
    user: root
    volumes:
      - ./zap/reports:/zap/wrk/:rw
    environment:
      TARGET_URL: http://backend-1:8000
    command: >
      zap-full-scan.py
      -t http://backend-1:8000
      -r fullscan-report.html
      -J fullscan-report.json
      -x fullscan-report.xml
      -a
      -I
    networks:
      - app-network

  apiscan:
    image: ghcr.io/zaproxy/zaproxy:stable
    user: root
    volumes:
      - ./zap/reports:/zap/wrk/:rw
    environment:
      TARGET_URL: http://backend-1:8000
    command: >
      zap-api-scan.py
      -t http://backend-1:8000/openapi.json
      -f openapi
      -r apiscan-report.html
      -J apiscan-report.json
      -I
    networks:
      - app-network

  viewer:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./zap/reports:/usr/share/nginx/html:ro
      - ./zap/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    restart: unless-stopped

  tester:
    image: zap-tester:latest
    user: root
    volumes:
      - ./zap/reports:/zap/wrk/:rw
    environment:
      PYTHONUNBUFFERED: 1
      TARGET_URL: http://backend-1:8000
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    external: true

volumes: {}
