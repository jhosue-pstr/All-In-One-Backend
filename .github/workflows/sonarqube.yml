name: SonarCloud Backend

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term
          sed -i 's|/home/runner/work/All-In-One-Backend/All-In-One-Backend|.|g' coverage.xml

      - name: Debug files (IMPORTANTE)
        run: |
          ls -la

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@4b30b3b86f804c1d643cfb874b64c041ae6d313c
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=jhosue-pstr_All-In-One-Backend
            -Dsonar.organization=jhosue-pstr
            -Dsonar.sources=.
            -Dsonar.projectBaseDir=/github/workspace
            -Dsonar.exclusions=test/**,media/**,*.db
            -Dsonar.python.coverage.reportPaths=coverage.xml