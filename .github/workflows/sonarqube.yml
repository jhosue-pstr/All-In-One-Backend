name: SonarCloud Backend

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          pip install --only-binary :all: -r requirements.txt
          pip install --only-binary :all: pytest==9.0.3 pytest-cov==7.1.0

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term
          sed -i 's|/home/runner/work/All-In-One-Backend/All-In-One-Backend|.|g' coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@aecaf43ae57e412bd97d70ef9ce6076e672fe0a9 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=jhosue-pstr_All-In-One-Backend
            -Dsonar.organization=jhosue-pstr
            -Dsonar.sources=.
            -Dsonar.tests=test
            -Dsonar.exclusions=test/**,media/**,*.db
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.12

      - name: Setup Java for CNES Report
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download CNES Report JAR
        run: |
          curl -sL -o sonar-cnes-report.jar \
            "https://github.com/cnescatlab/sonar-cnes-report/releases/download/5.0.4/sonar-cnes-report-5.0.4.jar"

      - name: Patch JAR for SonarCloud API v8
        run: |
          unzip -p sonar-cnes-report.jar metrics.properties | \
            sed 's/,files,/,fileUuids,/g' > metrics.properties
          zip -u sonar-cnes-report.jar metrics.properties
          rm metrics.properties
          unzip -p sonar-cnes-report.jar requests.properties | \
            sed 's/project=%s/projectKey=%s/g' > requests.properties
          zip -u sonar-cnes-report.jar requests.properties
          rm requests.properties

      - name: Generate CNES Report
        run: |
          java -jar sonar-cnes-report.jar \
            -t ${{ secrets.SONAR_TOKEN }} \
            -s https://sonarcloud.io \
            -p jhosue-pstr_All-In-One-Backend \
            -o ./cnes-report

      - name: Upload CNES Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cnes-report-backend
          path: ./cnes-report/
