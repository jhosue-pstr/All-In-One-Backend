# ============================================================
#  Docker Compose — Stack K6 + InfluxDB 1.8 + Grafana
#
#  SOLUCIÓN DEFINITIVA:
#  InfluxDB 1.8 es 100% compatible con grafana/k6:latest
#  sin necesidad de compilar plugins adicionales.
#
#  URLs:
#  Grafana   → http://localhost:3000  (dashboards)
#  InfluxDB  → http://localhost:8086/ping (verificar estado)
# ============================================================

services:

  # ── InfluxDB 1.8 — compatible nativo con k6 ───────────────
  influxdb:
    image: influxdb:1.8
    container_name: saucedemo_influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB:                k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      INFLUXDB_ADMIN_USER:        admin
      INFLUXDB_ADMIN_PASSWORD:    admin123
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - k6_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Grafana — dashboards de rendimiento ───────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: saucedemo_grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED:   "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:  Admin
      GF_AUTH_DISABLE_LOGIN_FORM:  "true"
      # Instalar plugin de k6 automáticamente
      GF_INSTALL_PLUGINS:          grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - k6_network
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # ── k6 — imagen oficial sin compilación extra ─────────────
  # grafana/k6:latest incluye soporte nativo para InfluxDB 1.8
  # No necesita Dockerfile.k6 para esta versión
  k6:
    image: grafana/k6:latest
    container_name: saucedemo_k6
    environment:
      # Formato nativo InfluxDB 1.8 — funciona sin plugins
      K6_OUT: influxdb=http://influxdb:8086/k6
    volumes:
      - ./tests:/scripts/tests
      - ./config:/scripts/config
      - ./results:/results
    networks:
      - k6_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
    profiles:
      - runner

volumes:
  influxdb_data:
    driver: local
  grafana_data:
    driver: local

networks:
  k6_network:
    driver: bridge
